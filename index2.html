  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #121212; --surface: #1e1e1e; --text: #e0e0e0; --text-muted: #999;
      --border: #333; --accent: #4da6ff; --accent-light: #1a2e44;
      --hover: #2a2a2a; --header-bg: #0a0a0a; --header-text: #e0e0e0;
    }
  }
  :root[data-theme="dark"] {
    --bg: #121212; --surface: #1e1e1e; --text: #e0e0e0; --text-muted: #999;
    --border: #333; --accent: #4da6ff; --accent-light: #1a2e44;
    --hover: #2a2a2a; --header-bg: #0a0a0a; --header-text: #e0e0e0;
  }
  .theme-toggle { background: none; border: 1px solid rgba(255,255,255,.3); border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 16px; line-height: 1; color: var(--header-text); }
  .theme-toggle:hover { background: rgba(255,255,255,.1); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; display: flex; flex-direction: column; overflow: hidden; }

  .top-bar { background: var(--header-bg); color: var(--header-text); padding: 8px 24px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 100; }
  .top-bar h1 { font-size: 18px; font-weight: 600; }
  .top-bar-right { display: flex; gap: 12px; align-items: center; }
  .search-box { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text); width: 260px; font-size: 14px; }
  .search-box:focus { outline: 2px solid var(--accent); border-color: transparent; }

  .toolbar { padding: 6px 24px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; gap: 6px; flex-wrap: wrap; align-items: center; flex-shrink: 0; }
  .btn { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; font-size: 13px; transition: all .15s; }
  .btn:hover { background: var(--hover); }
  .btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .badge { background: var(--accent-light); color: var(--accent); padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; margin-left: 4px; }

  .table-wrap { overflow-x: scroll; overflow-y: scroll; padding: 0; flex: 1 1 0; min-height: 0; }
  .table-wrap { scrollbar-color: var(--text-muted) var(--surface); scrollbar-width: auto; }
  .table-wrap::-webkit-scrollbar { width: 14px; }
  .table-wrap::-webkit-scrollbar-track { background: var(--surface); }
  .table-wrap::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 6px; border: 3px solid var(--surface); min-height: 40px; }
  .table-wrap::-webkit-scrollbar-thumb:hover { background: var(--accent); }
  .hscroll-bar { flex-shrink: 0; height: 14px; border-top: 1px solid var(--border); background: var(--surface); position: relative; cursor: pointer; }
  .hscroll-thumb { position: absolute; top: 2px; height: 10px; min-width: 40px; background: var(--text-muted); border-radius: 5px; cursor: grab; transition: background .15s; }
  .hscroll-thumb:hover, .hscroll-thumb.dragging { background: var(--accent); }
  table { width: max-content; border-collapse: collapse; margin-top: 0; font-size: 12px; }
  thead { position: sticky; top: 0; z-index: 50; }
  th { background: var(--header-bg); color: var(--header-text); padding: 4px 6px; text-align: left; white-space: nowrap; cursor: pointer; user-select: none; font-weight: 500; font-size: 11px; border-right: 1px solid rgba(255,255,255,.1); }
  th:hover { background: #333; }
  th .sort-icon { margin-left: 3px; opacity: .4; font-size: 9px; }
  th.sorted-asc .sort-icon, th.sorted-desc .sort-icon { opacity: 1; color: var(--accent); }
  th .col-filter { display: block; margin-top: 2px; padding: 2px 4px; font-size: 10px; border: 1px solid rgba(255,255,255,.2); border-radius: 3px; background: rgba(255,255,255,.1); color: var(--header-text); width: 100%; }
  th .col-filter:focus { border-color: var(--accent); outline: none; }
  th .col-filter::placeholder { color: rgba(255,255,255,.4); }
  td { padding: 3px 6px; border-bottom: 1px solid var(--border); white-space: nowrap; line-height: 1.3; }
  tr:hover td { background: var(--hover); }
  .link-icon { text-decoration: none; font-size: 13px; opacity: .7; transition: opacity .15s; }
  .link-icon:hover { opacity: 1; }
  .src-badge { display: inline-block; font-size: 8px; background: var(--warn); color: #333; padding: 0 3px; border-radius: 3px; font-weight: 700; vertical-align: middle; margin-right: 2px; cursor: help; }
  .wish-input { width: 40px; padding: 2px 4px; border: 1px solid var(--border); border-radius: 3px; background: var(--surface); color: var(--text); text-align: center; font-size: 12px; }
  .wish-input:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .note-input { width: 120px; padding: 2px 4px; border: 1px solid var(--border); border-radius: 3px; background: var(--surface); color: var(--text); font-size: 11px; }
  .note-input:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .val-min { color: var(--text); }
  .val-max { color: var(--text-muted); }
  .bool-yes { color: var(--success); font-weight: 600; }
  .bool-no { color: var(--text-muted); }
  .no-data { color: var(--text-muted); font-style: italic; }

  .preset-group { display: flex; gap: 6px; align-items: center; }
  .preset-group label { font-size: 12px; color: var(--text-muted); font-weight: 500; }

  .status-bar { padding: 4px 24px; font-size: 11px; color: var(--text-muted); border-top: 1px solid var(--border); background: var(--surface); display: flex; justify-content: space-between; flex-shrink: 0; }
  .group-header { background: #2a4a7a; color: #fff; text-align: center; font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; padding: 3px 6px; border-right: 2px solid rgba(255,255,255,.2); cursor: default; }
  .group-header:hover { background: #2a4a7a; }
  .group-header:nth-child(even) { background: #3a5a8a; }
  :root[data-theme="dark"] .group-header { background: #1a3050; }
  :root[data-theme="dark"] .group-header:nth-child(even) { background: #243a5a; }
  @media (prefers-color-scheme: dark) { :root:not([data-theme="light"]) .group-header { background: #1a3050; } :root:not([data-theme="light"]) .group-header:nth-child(even) { background: #243a5a; } }
  .ms-wrap { position: relative; }
  .ms-btn { display: block; width: 100%; margin-top: 2px; padding: 2px 4px; font-size: 10px; border: 1px solid rgba(255,255,255,.2); border-radius: 3px; background: rgba(255,255,255,.1); color: var(--header-text); cursor: pointer; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ms-btn.has-selection { border-color: var(--accent); background: rgba(42,74,122,.4); }
  .ms-drop { display: none; position: absolute; top: 100%; left: 0; min-width: 180px; max-height: 320px; overflow-y: auto; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; box-shadow: 0 4px 12px rgba(0,0,0,.4); z-index: 200; padding: 4px 0; }
  .ms-drop.open { display: block; }
  .ms-drop label { display: flex; align-items: center; gap: 6px; padding: 3px 10px; font-size: 11px; color: var(--text); cursor: pointer; white-space: nowrap; }
  .ms-drop label:hover { background: var(--hover); }
  .ms-drop input[type="checkbox"] { accent-color: var(--accent); margin: 0; }
  .ms-drop .ms-count { font-size: 9px; color: var(--text-muted); margin-left: auto; }
  .ms-drop .ms-actions { display: flex; gap: 4px; padding: 4px 8px; border-bottom: 1px solid var(--border); margin-bottom: 2px; }
  .ms-drop .ms-actions button { font-size: 10px; padding: 1px 6px; border: 1px solid var(--border); border-radius: 3px; background: var(--surface); color: var(--text-muted); cursor: pointer; }
  .ms-drop .ms-actions button:hover { background: var(--hover); color: var(--text); }
  .group-toggles { padding: 4px 24px; gap: 4px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .group-toggle { padding: 3px 10px; font-size: 11px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); cursor: pointer; transition: all .15s; }

  @media (prefers-color-scheme: dark) { :root:not([data-theme="light"]) .group-toggle.active { background: #1a3050; border-color: #1a3050; } }
</style>

const GROUP_NAMES = [...new Set(COLUMNS.map(c => c.group).filter(g => g))];
const EXCLUDED_FROM_ALLE = new Set(['LKW']);
let hiddenGroups = new Set();

function initGroupToggles() {
  try {
    const saved = localStorage.getItem('eauto_groups');
    hiddenGroups = saved ? new Set(JSON.parse(saved)) : new Set(EXCLUDED_FROM_ALLE);
  } catch(e) { hiddenGroups = new Set(EXCLUDED_FROM_ALLE); }
  const container = document.getElementById('groupToggles');
  const allBtn = document.createElement('button');
  const isAlleActive = () => { const nonExcluded = GROUP_NAMES.filter(g => !EXCLUDED_FROM_ALLE.has(g)); return nonExcluded.every(g => !hiddenGroups.has(g)); };
  allBtn.className = 'group-toggle' + (isAlleActive() ? ' active' : '');
  allBtn.textContent = 'Alle';
  allBtn.addEventListener('click', () => {
    hiddenGroups.clear();
    EXCLUDED_FROM_ALLE.forEach(g => hiddenGroups.add(g));
    localStorage.setItem('eauto_groups', JSON.stringify([...hiddenGroups]));
    container.querySelectorAll('.group-toggle').forEach(b => {
      const name = b.textContent;
      b.classList.toggle('active', !EXCLUDED_FROM_ALLE.has(name));
    });
    noneBtn.classList.remove('active');
    allBtn.classList.add('active');
    buildHeader();
    renderTable();
  });
  container.appendChild(allBtn);
  const noneBtn = document.createElement('button');
  noneBtn.className = 'group-toggle' + (hiddenGroups.size === GROUP_NAMES.length ? ' active' : '');
  noneBtn.textContent = 'Keine';
  noneBtn.addEventListener('click', () => {
    GROUP_NAMES.forEach(n => hiddenGroups.add(n));
    localStorage.setItem('eauto_groups', JSON.stringify([...hiddenGroups]));
    container.querySelectorAll('.group-toggle').forEach(b => b.classList.remove('active'));
    noneBtn.classList.add('active');
    buildHeader();
    renderTable();
  });
  container.appendChild(noneBtn);
  GROUP_NAMES.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'group-toggle' + (hiddenGroups.has(name) ? '' : ' active');
    btn.textContent = name;
    btn.addEventListener('click', () => {
      if (hiddenGroups.has(name)) { hiddenGroups.delete(name); btn.classList.add('active'); }
      else { hiddenGroups.add(name); btn.classList.remove('active'); }
      allBtn.classList.toggle('active', isAlleActive());
      noneBtn.classList.toggle('active', hiddenGroups.size === GROUP_NAMES.length);
      localStorage.setItem('eauto_groups', JSON.stringify([...hiddenGroups]));
      buildHeader();
      renderTable();
    });
    container.appendChild(btn);
  });
}

function isColVisible(col) {
  return !col.group || !hiddenGroups.has(col.group);
}

function buildMultiselectOptions(drop, colKey, sortKey, btn) {
  drop.innerHTML = '';
  const counts = {};
  data.forEach(d => {
    const v = getVal(d, colKey);
    const s = v != null ? String(v) : '';
    if (s && s !== 'null') counts[s] = (counts[s] || 0) + 1;
  });
  const values = Object.keys(counts).sort((a, b) => a.localeCompare(b));
  const selected = colFilters[sortKey] instanceof Set ? colFilters[sortKey] : new Set();
  const actions = document.createElement('div');
  actions.className = 'ms-actions';
  const selAll = document.createElement('button');
  selAll.textContent = 'Alle';
  selAll.type = 'button';
  selAll.addEventListener('click', (e) => { e.stopPropagation(); drop.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = true); values.forEach(v => selected.add(v)); colFilters[sortKey] = new Set(selected); updateMsBtn(btn, selected, values.length); renderTable(); });
  const selNone = document.createElement('button');
  selNone.textContent = 'Keine';
  selNone.type = 'button';
  selNone.addEventListener('click', (e) => { e.stopPropagation(); drop.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = false); selected.clear(); delete colFilters[sortKey]; updateMsBtn(btn, selected, values.length); renderTable(); });
  actions.appendChild(selAll);
  actions.appendChild(selNone);
  drop.appendChild(actions);
  values.forEach(val => {
    const label = document.createElement('label');
    label.addEventListener('click', e => e.stopPropagation());
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = selected.has(val);
    cb.addEventListener('change', () => {
      if (cb.checked) selected.add(val); else selected.delete(val);
      if (selected.size === 0 || selected.size === values.length) { delete colFilters[sortKey]; } else { colFilters[sortKey] = new Set(selected); }
      updateMsBtn(btn, selected, values.length);
      renderTable();
    });
    const text = document.createTextNode(val);
    const count = document.createElement('span');
    count.className = 'ms-count';
    count.textContent = counts[val];
    label.appendChild(cb);
    label.appendChild(text);
    label.appendChild(count);
    drop.appendChild(label);
  });
}

function updateMsBtn(btn, selected, total) {
  if (selected.size === 0 || selected.size === total) {
    btn.textContent = 'Filter...';
    btn.classList.remove('has-selection');
  } else if (selected.size <= 2) {
    btn.textContent = [...selected].join(', ');
    btn.classList.add('has-selection');
  } else {
    btn.textContent = selected.size + ' gewählt';
    btn.classList.add('has-selection');
  }
}

}

function isRange(v) {
  return v && typeof v === 'object' && 'min' in v && 'max' in v;
}

function numVal(v) {
  if (v === null || v === undefined) return null;
  if (isRange(v)) return v.min;
  if (typeof v === 'boolean') return v ? 1 : 0;
  const n = parseFloat(v);
  return isNaN(n) ? null : n;
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function isSafeUrl(url) {
  try { const u = new URL(url, location.href); return u.protocol === 'https:' || u.protocol === 'http:'; }
  catch { return false; }
}

function displayVal(v, col) {
  if (v === null || v === undefined) return '<span class="no-data">-</span>';
  if (col.type === 'link') {
    if (!isSafeUrl(v)) return '<span class="no-data">-</span>';
    const safe = escapeHtml(v);
    const icon = col.key === 'bild_url' ? '&#128247;' : '&#128279;';
    return `<a href="${safe}" target="_blank" rel="noopener noreferrer" class="link-icon" title="${safe}">${icon}</a>`;
  }
  if (col.type === 'bool') return v ? '<span class="bool-yes">Ja</span>' : '<span class="bool-no">Nein</span>';
  if (isRange(v)) return `<span class="val-min">${escapeHtml(String(v.min))}</span> <span class="val-max">/ ${escapeHtml(String(v.max))}</span>`;
  if (typeof v === 'number') return v.toLocaleString('de-DE');
  if (Array.isArray(v)) return escapeHtml(v.join(', '));
  return escapeHtml(String(v));
}

function rangeHeaders(col) {
  if (col.type === 'range') return [col.label + ' min', col.label + ' max'];
  return [col.label];
}

function rangeCells(v, col) {
  if (col.type === 'range' && isRange(v)) {
    return [`<span class="val-min">${v.min}</span>`, `<span class="val-max">${v.max}</span>`];
  }
  if (col.type === 'range') {
    const d = '<span class="no-data">-</span>';
    return [v !== null ? String(v) : d, d];
  }
  return [displayVal(v, col)];
}

function buildHeader() {
  const gr = document.getElementById('groupRow');
  const tr = document.getElementById('headerRow');
  gr.innerHTML = '';
  tr.innerHTML = '';
  const groups = [];
  COLUMNS.filter(isColVisible).forEach(col => {
    const span = col.type === 'range' ? 2 : 1;
    const name = col.group || '';
    if (groups.length && groups[groups.length-1].name === name) {
      groups[groups.length-1].span += span;
    } else {
      groups.push({ name, span });
    }
  });
  groups.forEach(g => {
    const th = document.createElement('th');
    th.colSpan = g.span;
    th.className = 'group-header';
    th.textContent = g.name;
    gr.appendChild(th);
  });
  COLUMNS.forEach((col, ci) => {
    if (!isColVisible(col)) return;
    const headers = col.type === 'range' ? [col.label + ' min', col.label + ' max'] : [col.label];
    headers.forEach((h, hi) => {
      const th = document.createElement('th');
      const sortKey = col.type === 'range' ? col.key + (hi === 0 ? '.min' : '.max') : col.key;
      th.dataset.sortKey = sortKey;
      th.dataset.colIdx = ci;
      if (col.type === 'multiselect') {
        th.innerHTML = `${h}<span class="sort-icon">▲</span>`;
        th.addEventListener('click', (e) => {
          if (e.target.closest('.ms-wrap')) return;
          toggleSort(sortKey);
        });
        const wrap = document.createElement('div');
        wrap.className = 'ms-wrap';
        const btn = document.createElement('button');
        btn.className = 'ms-btn';
        btn.type = 'button';
        btn.textContent = 'Filter...';
        btn.dataset.filterKey = sortKey;
        const drop = document.createElement('div');
        drop.className = 'ms-drop';
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const wasOpen = drop.classList.contains('open');
          document.querySelectorAll('.ms-drop.open').forEach(d => d.classList.remove('open'));
          if (!wasOpen) {
            buildMultiselectOptions(drop, col.key, sortKey, btn);
            drop.classList.add('open');
          }
        });
        wrap.appendChild(btn);
        wrap.appendChild(drop);
        th.appendChild(wrap);
      } else {
        th.innerHTML = `${h}<span class="sort-icon">▲</span><input type="text" class="col-filter" placeholder="Filter..." data-filter-key="${sortKey}">`;
        th.addEventListener('click', (e) => {
          if (e.target.classList.contains('col-filter')) return;
          toggleSort(sortKey);
        });
        const input = th.querySelector('.col-filter');
        input.addEventListener('input', () => {
          colFilters[sortKey] = input.value.trim().toLowerCase();
          renderTable();
        });
        input.addEventListener('click', e => e.stopPropagation());
      }
      tr.appendChild(th);
    });
  });
}

function toggleSort(key) {
  if (sortCol === key) { sortDir = sortDir === 'asc' ? 'desc' : 'asc'; }
  else { sortCol = key; sortDir = 'asc'; }
  renderTable();
}

function getSortVal(item, key) {
  if (key.endsWith('.min') || key.endsWith('.max')) {
    const base = key.replace(/\.(min|max)$/, '');
    const which = key.endsWith('.min') ? 'min' : 'max';
    const v = getVal(item, base);
    if (isRange(v)) return v[which];
    return numVal(v);
  }
  const v = getVal(item, key);
  return numVal(v) !== null ? numVal(v) : (v ? String(v).toLowerCase() : '');
}

function matchFilter(item, key, filter) {
  if (!filter) return true;
  if (filter instanceof Set) {
    const v = getVal(item, key);
    return filter.has(v != null ? String(v) : '');
  }
  const v = getSortVal(item, key);
  if (filter.startsWith('>')) { const n = parseFloat(filter.slice(1)); return !isNaN(n) && typeof v === 'number' && v > n; }
  if (filter.startsWith('<')) { const n = parseFloat(filter.slice(1)); return !isNaN(n) && typeof v === 'number' && v < n; }
  if (filter.startsWith('=')) { const t = filter.slice(1); return String(v) === t; }
  return String(v).toLowerCase().includes(filter);
}

function applyPreset(items) {
  switch (activePreset) {
    case 'pref': return items.filter(d => d.user_wish !== null && d.user_wish !== undefined && d.user_wish !== '');
    case 'range400': return items.filter(d => { const v = getVal(d, 'verbrauch.wltp_reichweite_km'); return isRange(v) ? v.max > 400 : numVal(v) > 400; });
    case 'price50k': return items.filter(d => getVal(d, 'preis.basispreis_eur') < 50000);
    case 'awd': return items.filter(d => (getVal(d, 'antrieb.konzept') || '').includes('AWD') || (getVal(d, 'antrieb.konzept') || '').includes('Allrad'));
    case 'dc150': return items.filter(d => getVal(d, 'laden.dc_max_kw') > 150);
    case 'ac22': return items.filter(d => getVal(d, 'laden.ac_serie_kw') >= 22 || getVal(d, 'laden.ac_optional_kw') >= 22);
    case 'heatpump': return items.filter(d => getVal(d, 'fahrwerk.waermepumpe') === true);
    case 'fast06': return items.filter(d => getVal(d, 'leistung.beschleunigung_0_100_s') < 6);
    default: return items;
  }
}

function renderTable() {
  let items = [...data];
  const search = document.getElementById('globalSearch').value.trim().toLowerCase();
  if (search) {
    items = items.filter(d => JSON.stringify(d).toLowerCase().includes(search));
  }
  items = applyPreset(items);
  for (const [key, filter] of Object.entries(colFilters)) {
    if (filter) items = items.filter(d => matchFilter(d, key, filter));
  }
  if (sortCol) {
    items.sort((a, b) => {
      let va = getSortVal(a, sortCol), vb = getSortVal(b, sortCol);
      if (va === null || va === '') return 1;
      if (vb === null || vb === '') return -1;
      if (typeof va === 'number' && typeof vb === 'number') return sortDir === 'asc' ? va - vb : vb - va;
      return sortDir === 'asc' ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
    });
  }
  document.querySelectorAll('th').forEach(th => { th.classList.remove('sorted-asc', 'sorted-desc'); if (th.dataset.sortKey === sortCol) th.classList.add('sorted-' + sortDir); });
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  items.forEach((item, idx) => {
    const tr = document.createElement('tr');
    COLUMNS.forEach(col => {
      if (!isColVisible(col)) return;
      const v = getVal(item, col.key);
      const cells = rangeCells(v, col);
      cells.forEach(html => {
        const td = document.createElement('td');
        if (col.editable === true) {
          if (dataSource === 'embedded') {
            const badge = document.createElement('span');
            badge.className = 'src-badge';
            badge.title = 'Eingebettete Daten';
            badge.textContent = 'int';
            td.appendChild(badge);
          }
          const inp = document.createElement('input');
          inp.type = 'number';
          inp.className = 'wish-input';
          inp.value = v !== null && v !== undefined ? v : '';
          inp.addEventListener('change', () => {
            const newVal = inp.value === '' ? null : parseInt(inp.value);
            item.user_wish = newVal;
            saveUserData();
            if (activePreset === 'pref') renderTable();
          });
          td.appendChild(inp);
        } else if (col.editable === 'text') {
          const inp = document.createElement('input');
          inp.type = 'text';
          inp.className = 'note-input';
          inp.value = v || '';
          inp.placeholder = 'Notiz...';
          inp.addEventListener('change', () => {
            item.bemerkung = inp.value || null;
            saveUserData();
          });
          td.appendChild(inp);
        } else {
          td.innerHTML = html;
        }
        tr.appendChild(td);
      });
    });
    tbody.appendChild(tr);
  });
  const modelsShown = new Set(items.map(d => d.marke + ' ' + d.modell.replace(/ (eDrive|xDrive|AWD|RWD|FWD|Long Range|Standard).*/, ''))).size;
  const modelsTotal = new Set(data.map(d => d.marke + ' ' + d.modell.replace(/ (eDrive|xDrive|AWD|RWD|FWD|Long Range|Standard).*/, ''))).size;
  document.getElementById('statusCount').textContent = `${items.length} Varianten (${modelsShown} Modelle) von ${data.length} gesamt (${modelsTotal} Modelle)`;
  document.querySelectorAll('[data-preset]').forEach(b => b.classList.toggle('active', b.dataset.preset === activePreset));
}

function saveUserData() {
  const ud = {};
  data.forEach(d => {
    const entry = {};
    if (d.user_wish !== null) entry.wish = d.user_wish;
    if (d.bemerkung) entry.bemerkung = d.bemerkung;
    if (Object.keys(entry).length) ud[d.modell] = entry;
  });
  localStorage.setItem('eauto_userdata', JSON.stringify(ud));
}

function loadUserData() {
  try {
    const ud = JSON.parse(localStorage.getItem('eauto_userdata') || '{}');
    data.forEach(d => {
      if (ud[d.modell]) {
        if (ud[d.modell].wish !== undefined) d.user_wish = ud[d.modell].wish;
        if (ud[d.modell].bemerkung) d.bemerkung = ud[d.modell].bemerkung;
      }
    });
  } catch(e) {}
}

function getFilteredItems() {
  let items = [...data];
  const search = document.getElementById('globalSearch').value.trim().toLowerCase();
  if (search) items = items.filter(d => JSON.stringify(d).toLowerCase().includes(search));
  items = applyPreset(items);
  for (const [key, filter] of Object.entries(colFilters)) {
    if (filter) items = items.filter(d => matchFilter(d, key, filter));
  }
  if (sortCol) {
    items.sort((a, b) => {
      let va = getSortVal(a, sortCol), vb = getSortVal(b, sortCol);
      if (va === null || va === '') return 1;
      if (vb === null || vb === '') return -1;
      if (typeof va === 'number' && typeof vb === 'number') return sortDir === 'asc' ? va - vb : vb - va;
      return sortDir === 'asc' ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
    });
  }
  return items;
}

function exportCSV() {
  const items = getFilteredItems();
  const headers = [];
  const visCols = COLUMNS.filter(isColVisible);
  visCols.forEach(col => { if (col.type === 'range') { headers.push(col.label + ' min', col.label + ' max'); } else headers.push(col.label); });
  const rows = [headers.join(';')];
  items.forEach(d => {
    const cells = [];
    visCols.forEach(col => {
      const v = getVal(d, col.key);
      if (col.type === 'range' && isRange(v)) { cells.push(v.min, v.max); }
      else if (col.type === 'range') { cells.push(v || '', ''); }
      else if (col.type === 'bool') { cells.push(v ? 'Ja' : 'Nein'); }
      else { cells.push(v !== null && v !== undefined ? v : ''); }
    });
    rows.push(cells.join(';'));
  });
  const blob = new Blob(['﻿' + rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'eAuto_Vergleich.csv';
  a.click();
}

async function loadData() {
  try {
    const resp = await fetch('eAuto.json?t=' + Date.now());
    if (!resp.ok) throw new Error('not found');
    const json = await resp.json();
    data = json.fahrzeuge || [];
    dataSource = 'json';
    document.getElementById('statusFile').textContent = `eAuto.json geladen (${data.length} Fahrzeuge)`;
  } catch(e) {
    data = JSON.parse(JSON.stringify(DEFAULT_DATA.fahrzeuge));
    dataSource = 'embedded';
    document.getElementById('statusFile').textContent = `Eingebettete Daten (${data.length} Fahrzeuge)`;
  }
  loadUserData();
  buildHeader();
  renderTable();
}

document.getElementById('globalSearch').addEventListener('input', renderTable);
document.querySelectorAll('[data-preset]').forEach(btn => {
  btn.addEventListener('click', () => { activePreset = btn.dataset.preset; renderTable(); });
});
document.getElementById('btnExportCSV').addEventListener('click', exportCSV);
document.getElementById('btnExportJSON').addEventListener('click', () => {
  const items = getFilteredItems();
  const exportData = { fahrzeuge: items };
  const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'eAuto.json';
  a.click();
});
document.getElementById('btnImportJSON').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const json = JSON.parse(ev.target.result);
      if (!json.fahrzeuge || !Array.isArray(json.fahrzeuge)) { alert('Ungueltige JSON-Datei: "fahrzeuge" Array fehlt.'); return; }
      data = json.fahrzeuge;
      dataSource = 'json';
      loadUserData();
      buildHeader();
      renderTable();
      document.getElementById('statusFile').textContent = `${file.name} importiert (${data.length} Fahrzeuge)`;
    } catch(err) { alert('Fehler beim Einlesen: ' + err.message); }
  };
  reader.readAsText(file);
  e.target.value = '';
});
document.getElementById('btnReset').addEventListener('click', () => {
  activePreset = 'all';
  document.getElementById('globalSearch').value = '';
  colFilters = {};
  sortCol = null; sortDir = 'asc';
  document.querySelectorAll('.col-filter').forEach(i => i.value = '');
  document.querySelectorAll('.ms-btn').forEach(b => { b.textContent = 'Filter...'; b.classList.remove('has-selection'); });
  document.querySelectorAll('.ms-drop.open').forEach(d => d.classList.remove('open'));
  renderTable();
});

function initTheme() {
  const saved = localStorage.getItem('eauto_theme');
  if (saved) { document.documentElement.dataset.theme = saved; }
  updateThemeIcon();
}
function updateThemeIcon() {
  const t = document.documentElement.dataset.theme;
  const isDark = t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches);
  document.getElementById('themeToggle').textContent = isDark ? '☀' : '☾';
}
document.getElementById('themeToggle').addEventListener('click', () => {
  const current = document.documentElement.dataset.theme;
  const sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  let next;
  if (!current) { next = sysDark ? 'light' : 'dark'; }
  else if (current === 'dark') { next = 'light'; }
  else { next = 'dark'; }
  document.documentElement.dataset.theme = next;
  localStorage.setItem('eauto_theme', next);
  updateThemeIcon();
});
initTheme();
initGroupToggles();
loadData();

const tw = document.getElementById('tableWrap');
const hBar = document.getElementById('hscrollBar');
const hThumb = document.getElementById('hscrollThumb');

function updateThumb() {
  const ratio = tw.clientWidth / tw.scrollWidth;
  if (ratio >= 1) { hBar.style.display = 'none'; return; }
  hBar.style.display = 'block';
  const trackW = hBar.clientWidth;
  const thumbW = Math.max(40, trackW * ratio);
  const maxLeft = trackW - thumbW;
  const scrollRatio = tw.scrollLeft / (tw.scrollWidth - tw.clientWidth);
  hThumb.style.width = thumbW + 'px';
  hThumb.style.left = (maxLeft * scrollRatio) + 'px';
}

tw.addEventListener('scroll', updateThumb);
new ResizeObserver(updateThumb).observe(tw);

let dragging = false, dragStartX = 0, dragStartLeft = 0;
hThumb.addEventListener('mousedown', e => {
  dragging = true; dragStartX = e.clientX; dragStartLeft = parseFloat(hThumb.style.left) || 0;
  hThumb.classList.add('dragging'); e.preventDefault();
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  const trackW = hBar.clientWidth;
  const thumbW = hThumb.offsetWidth;
  const maxLeft = trackW - thumbW;
  const newLeft = Math.max(0, Math.min(maxLeft, dragStartLeft + e.clientX - dragStartX));
  const scrollRatio = newLeft / maxLeft;
  tw.scrollLeft = scrollRatio * (tw.scrollWidth - tw.clientWidth);
});
window.addEventListener('mouseup', () => { dragging = false; hThumb.classList.remove('dragging'); });
hBar.addEventListener('click', e => {
  if (e.target === hThumb) return;
  const rect = hBar.getBoundingClientRect();
  const clickX = e.clientX - rect.left;
  const trackW = hBar.clientWidth;
  tw.scrollLeft = (clickX / trackW) * (tw.scrollWidth - tw.clientWidth);
});

const _origRender = renderTable;
renderTable = function() { _origRender.apply(this, arguments); setTimeout(updateThumb, 50); };
const _origBuild = buildHeader;
buildHeader = function() { _origBuild.apply(this, arguments); setTimeout(updateThumb, 50); };
setTimeout(updateThumb, 500);
</script>
